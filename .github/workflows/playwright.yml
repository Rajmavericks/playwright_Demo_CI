name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    
    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-test-results
        path: test-results/
        retention-days: 30
    
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
    
    - name: Upload Allure Results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: ${{ !cancelled() }}
      with:
        files: test-results/results.xml
        check_name: Test Results

    - name: Deploy Allure Report to GitHub Pages
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() }}
      run: |
        # Copy allure-report to docs folder
        rm -rf docs
        cp -r allure-report docs
        
        # Configure Git
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Commit and push
        git add docs/
        git commit -m "chore: update allure report from workflow run ${{ github.run_number }}" || echo "No changes to commit"
        git push origin main
      continue-on-error: true
